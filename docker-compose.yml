services:
  losergod:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-mirror.gcr.io/library/node:24-slim}
    ports:
      - "${HOST_PORT:-5173}:5173"
    environment:
      PORT: "5173"
      LOSERGOD_API: "mock"
    volumes:
      - ./.losergod-cache:/app/.losergod-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
